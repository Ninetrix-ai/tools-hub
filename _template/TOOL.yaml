name: my-tool                         # lowercase slug, must match directory name
version: 1.0.0                        # semver — bump when config changes
description: "Short description of what this tool does"
author: your-github-username           # or "ninetrix" for official tools
tags: [category, specific-tag]         # for search/filtering
verified: false                        # true = Ninetrix-tested

# How to run this tool — exactly one source block
source:
  type: mcp                            # mcp | openapi | plugin
  runner: npx                          # npx | uvx | python | docker (mcp only)
  package: "@org/mcp-server-name"      # npm/PyPI package (mcp only)
  args: []                             # CLI arguments (mcp only)
  # spec_url: "https://..."            # OpenAPI spec URL (openapi only)
  # base_url: "https://..."            # Base URL override (openapi only)
  # pip_package: "ninetrix-source-X"   # PyPI package (plugin only)

# Credentials the tool needs at runtime
credentials:
  MY_API_KEY:
    label: "Human-readable description of this credential"
    required: true

# Optional: aliases so users can use friendlier env var names
# credential_aliases:
#   FRIENDLY_NAME: CANONICAL_NAME
