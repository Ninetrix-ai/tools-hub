name: gh
version: 1.0.0
description: "GitHub CLI — repos, issues, PRs, releases, Actions, gists, and raw API access"
author: ninetrix
tags:
- developer
- git
- github
- ci-cd
verified: true

skill_set:
  - hub://gh-master@1.0.0

source:
  type: cli
  install: "apt-get update && apt-get install -y wget && wget -qO /tmp/gh.deb https://github.com/cli/cli/releases/download/v2.67.0/gh_2.67.0_linux_amd64.deb && dpkg -i /tmp/gh.deb && rm /tmp/gh.deb"

credentials:
  GITHUB_TOKEN:
    label: GitHub personal access token (used by gh for auth)
    required: true
